<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeetCode Orbit | Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body data-page="profile">
    <div class="space-bg"></div>
    <div class="starfield"></div>
    <header class="navbar-wrap">
      <nav class="navbar glass-panel">
        <a class="logo" href="./index.html">NeetCode Orbit</a>
        <div class="nav-links">
          <a href="./today.html">Today</a>
          <a href="./calendar.html">Calendar</a>
          <a href="./progress.html">Progress</a>
          <a href="./profile.html">Profile</a>
          <button id="logoutBtn" class="ghost-btn">Logout</button>
        </div>
      </nav>
    </header>
    <main class="page-shell">
      <section class="section-head">
        <p class="eyebrow">Profile</p>
        <h1>Mission Commander Data</h1>
      </section>
      <section class="metrics-grid">
        <article class="glass-panel metric-card">
          <p class="metric-label">User Name</p>
          <h2 id="profileName">-</h2>
        </article>
        <article class="glass-panel metric-card">
          <p class="metric-label">Email</p>
          <h2 id="profileEmail">-</h2>
        </article>
        <article class="glass-panel metric-card">
          <p class="metric-label">Start Date</p>
          <h2 id="profileStartDate">-</h2>
        </article>
        <article class="glass-panel metric-card">
          <p class="metric-label">Solved Count</p>
          <h2 id="profileSolved">0</h2>
        </article>
      </section>
      <section class="glass-panel">
        <button id="resetTrackerBtn" class="danger-btn">Reset Tracker</button>
        <p class="meta-text">Clears your stored progress and schedule after confirmation.</p>
      </section>
    </main>
    <script type="module" src="./assets/js/ui.js"></script>
    <script type="module" src="./assets/js/auth.js"></script>
    <script type="module" src="./assets/js/profile.js"></script>
  </body>
</html>
